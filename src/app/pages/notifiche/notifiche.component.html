<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">Notifiche</h1>
    @if (nonLette() > 0) {
      <button class="btn-cancel2" (click)="segnaTutteLette()">Segna tutte come lette</button>
    }
  </div>

  @if (loading()) {
    <p class="u-text-xs-muted">Caricamento...</p>
  } @else if (notifiche().length === 0) {
    <p class="u-text-xs-muted">Nessuna notifica.</p>
  } @else {
    <div class="notifiche-list">
      @for (n of notifiche(); track n.id_notifica) {
        <div class="notifica-card" [class.non-letta]="!n.letta" (click)="apri(n)">
          <span class="notifica-icona">{{ icona(n.tipo) }}</span>
          <div class="notifica-body">
            <p class="notifica-testo">{{ n.testo }}</p>
            <span class="notifica-time u-text-xs-muted">{{ n.timestamp_notifica | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
          @if (!n.letta) {
            <span class="notifica-dot"></span>
          }
        </div>
      }
    </div>
  }

</div>
