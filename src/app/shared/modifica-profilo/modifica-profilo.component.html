@if (aperto) {
  <div class="modal-bg open" (click)="onBgClick($event)">
    <div class="modal u-mw520">

      <div class="modal-h">✏️ Modifica profilo</div>

      <form [formGroup]="form">

        <!-- FOTO PROFILO -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px">
          <div class="prof-av" style="width:80px;height:80px;font-size:2rem;position:relative">
            @if (fotoPreview()) {
              <img [src]="fotoPreview()!"
                   style="width:100%;height:100%;object-fit:cover;border-radius:50%" />
            } @else {
              {{ auth.utenteCorrente()?.nome_completo?.substring(0,2)?.toUpperCase() }}
            }
          </div>
          <label style="cursor:pointer;color:var(--lime);font-size:.82rem;font-weight:600">
            📷 Cambia foto profilo
            <input type="file" accept="image/*" style="display:none"
                   (change)="onFotoChange($event)" />
          </label>
          @if (fotoPreview()) {
            <button type="button"
                    style="background:none;border:none;color:var(--terra);font-size:.75rem;cursor:pointer"
                    (click)="fotoPreview.set(null)">
              ✕ Rimuovi foto
            </button>
          }
        </div>

        <!-- INDIRIZZO -->
        <div class="fg" style="margin-bottom:12px">
          <label class="fl">Indirizzo</label>
          <input class="fi" type="text" formControlName="indirizzo"
                 placeholder="Via Roma 12" />
        </div>

        <!-- CITTÀ -->
        <div class="fg" style="margin-bottom:12px">
          <label class="fl">Città</label>
          <select class="fi" formControlName="citta" (change)="onCittaChange($event)">
            <option value="">Seleziona città...</option>
            @for (c of citta; track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>

        <!-- QUARTIERE -->
        <div class="fg" style="margin-bottom:12px">
          <label class="fl">Quartiere</label>
          <select class="fi" formControlName="id_quartiere">
            <option value="">
              {{ quartieriFiltrarti().length === 0 ? 'Scegli prima una città...' : 'Seleziona quartiere...' }}
            </option>
            @for (q of quartieriFiltrarti(); track q.id_quartiere) {
              <option [value]="q.id_quartiere">{{ q.nome_quartiere }}</option>
            }
          </select>
        </div>

        <!-- NUOVA PASSWORD -->
        <div class="fg" style="margin-bottom:12px">
          <label class="fl">Nuova password (opzionale)</label>
          <input class="fi" type="password" formControlName="password_nuova"
                 placeholder="Lascia vuoto per non modificarla" />
        </div>

        <!-- CONFERMA PASSWORD -->
        <div class="fg" style="margin-bottom:20px">
          <label class="fl">Conferma nuova password</label>
          <input class="fi" type="password" formControlName="password_conferma"
                 placeholder="Ripeti la nuova password" />
        </div>

        <div class="modal-acts">
          <button type="button" class="btn-confirm" (click)="salva()">
            💾 Salva modifiche
          </button>
          <button type="button" class="btn-cancel2" (click)="chiudi()">
            Annulla
          </button>
        </div>

      </form>
    </div>
  </div>
}
